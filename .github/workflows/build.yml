name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: List APK output dir
        if: success()
        run: find app/build/outputs -type f -name "*.apk" -print > apk-list.txt; cat apk-list.txt

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish failure log to debug-logs branch
        if: failure()
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          tail -c 60000 build-output.log > debug-build-output.log 2>/dev/null || echo "no build-output.log" > debug-build-output.log
          find app/build/outputs -type f -name "*.apk" > debug-apk-list.txt 2>/dev/null || true
          git checkout --orphan debug-logs
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add debug-build-output.log debug-apk-list.txt
          git commit -m "CI debug log $(date -u +%Y%m%dT%H%M%SZ)"
          git push -f origin debug-logs
