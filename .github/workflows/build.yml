name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish failure log as Gist
        if: failure()
        run: |
          tail -c 60000 build-output.log > build-output-tail.log
          python3 -c "
          import json
          with open('build-output-tail.log') as f:
              content = f.read()
          with open('payload.json', 'w') as out:
              json.dump({'description': 'Build failure log', 'public': False, 'files': {'build-output.log': {'content': content}}}, out)
          "
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -d @payload.json https://api.github.com/gists
